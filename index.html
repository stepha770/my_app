<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>充電管家</title>
    <style>
        :root { --primary: #007AFF; --danger: #FF3B30; --bg: #F2F2F7; }
        body { font-family: -apple-system, system-ui; background: var(--bg); margin: 0; padding: 20px; color: #1C1C1E; }
        h2 { text-align: center; margin-bottom: 25px; }
        .card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .input-group input { 
            width: 100%; border: 1px solid #D1D1D6; border-radius: 8px; 
            padding: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; 
        }
        button { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-add { background: var(--primary); color: white; }
        .btn-reset { background: #E5E5EA; color: var(--primary); margin-top: 10px; }
        .btn-del { background: transparent; color: var(--danger); margin-top: 10px; font-size: 14px; }
        .status { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .red { color: var(--danger); }
        .green { color: #34C759; }
    </style>
</head>
<body>

    <h2>🔋 充電管家</h2>

    <div class="card">
        <div class="input-group">
            <input type="text" id="name" placeholder="名稱 (例如：刮鬍刀)">
            <input type="number" id="days" placeholder="幾天充一次？(例如：30)">
            <button class="btn-add" onclick="addItem()">＋ 新增到清單</button>
        </div>
    </div>

    <div id="list"></div>

    <script>
        // 1. 初始化資料 (嘗試從瀏覽器記憶體讀取)
        let devices = [];
        try {
            const saved = localStorage.getItem('charge_manager_data');
            if (saved) devices = JSON.parse(saved);
        } catch (e) {
            console.error("讀取失敗", e);
        }

        // 2. 新增功能的函數
        function addItem() {
            const nameEl = document.getElementById('name');
            const daysEl = document.getElementById('days');
            
            if (nameEl.value.trim() === "" || daysEl.value === "") {
                alert("請輸入完整名稱和天數喔！");
                return;
            }

            const newItem = {
                name: nameEl.value,
                days: parseInt(daysEl.value),
                lastDate: Date.now() // 紀錄當下的時間戳記
            };

            devices.push(newItem);
            saveAndRender();

            // 清空輸入框
            nameEl.value = "";
            daysEl.value = "";
        }

        // 3. 重設充電時間 (剛充完電)
        function resetDate(index) {
            devices[index].lastDate = Date.now();
            saveAndRender();
        }

        // 4. 刪除機器
        function deleteItem(index) {
            if (confirm("確定要刪除這台機器嗎？")) {
                devices.splice(index, 1);
                saveAndRender();
            }
        }

        // 5. 儲存並刷新畫面
        function saveAndRender() {
            localStorage.setItem('charge_manager_data', JSON.stringify(devices));
            renderList();
        }

        // 6. 渲染清單到網頁上
        function renderList() {
            const listEl = document.getElementById('list');
            listEl.innerHTML = "";

            devices.forEach((item, index) => {
                const now = Date.now();
                const passedDays = Math.floor((now - item.lastDate) / (1000 * 60 * 60 * 24));
                const remaining = item.days - passedDays;
                
                const isUrgent = remaining <= 3; // 剩 3 天就變紅字
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="font-size:18px;">${item.name}</strong>
                        <span style="color:gray; font-size:12px;">週期:${item.days}天</span>
                    </div>
                    <div class="status ${isUrgent ? 'red' : 'green'}">
                        ${remaining > 0 ? '剩餘 ' + remaining + ' 天' : '已過期 ' + Math.abs(remaining) + ' 天'}
                    </div>
                    <button class="btn-reset" onclick="resetDate(${index})">剛充完電，重新計時</button>
                    <button class="btn-del" onclick="deleteItem(${index})">刪除機器</button>
                `;
                listEl.appendChild(card);
            });
        }

        // 初始執行一次
        renderList();
    </script>
</body>
</html>
